<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/select_game.css">
    <script src="../js/select_game.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>בחר את המשחק שלך</h1>
        <div class="games-grid" >
            <div class="game-option" onclick="select_taki()">
                <a href="#">
                    <img src="./תמונות/TAKI_logo.png" alt="משחק 1">
                    <h3>טאקי</h3>
                </a>
            </div>
            <div class="game-option" onclick="select_bul_pgiha()">
                <a href="#">
                    <img src="./תמונות/בול פגיעה.png" alt="משחק 2">
                    <h3>בול-פגיעה</h3>
                </a>
            </div>
            <div class="game-option" onclick="select_remember_game()">
                <a href="#">
                    <img src="./תמונות/משחק הזיכרון.png" alt="משחק 3">
                    <h3>משחק הזיכרון</h3>
                </a>
            </div>
            <div class="game-option" onclick="select_lights_game()">
                <a href="#">
                    <img src="./תמונות/תפוס תריבוע.png" alt="משחק 4">
                    <h3>תפוס את הריבוע</h3>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
